<svg viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#080C14"/><stop offset="100%" stop-color="#101828"/></linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#818CF8"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="520" height="160" rx="14" fill="url(#bg)"/>
  <rect width="520" height="160" rx="14" fill="none" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.25"/>
  <!-- 3-node cluster -->
  <g transform="translate(18,20)" filter="url(#glow)">
    <!-- M1 master -->
    <rect x="20" y="30" width="36" height="30" rx="5" fill="#080C14" stroke="#38BDF8" stroke-width="2"/>
    <text x="38" y="50" text-anchor="middle" fill="#38BDF8" font-size="10" font-weight="800">M1</text>
    <!-- M2 -->
    <rect x="68" y="16" width="36" height="30" rx="5" fill="#080C14" stroke="#818CF8" stroke-width="1.5"/>
    <text x="86" y="36" text-anchor="middle" fill="#818CF8" font-size="10" font-weight="700">M2</text>
    <!-- M3 -->
    <rect x="68" y="54" width="36" height="30" rx="5" fill="#080C14" stroke="#818CF8" stroke-width="1.5"/>
    <text x="86" y="74" text-anchor="middle" fill="#818CF8" font-size="10" font-weight="700">M3</text>
    <!-- Connections -->
    <line x1="56" y1="45" x2="68" y2="31" stroke="#38BDF8" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="56" y1="45" x2="68" y2="69" stroke="#818CF8" stroke-width="1.5" stroke-opacity="0.7"/>
    <!-- GPU bars -->
    <rect x="24" y="70" width="4" height="12" rx="1" fill="#38BDF8" fill-opacity="0.8"/>
    <rect x="30" y="68" width="4" height="14" rx="1" fill="#38BDF8" fill-opacity="0.9"/>
    <rect x="36" y="66" width="4" height="16" rx="1" fill="#38BDF8"/>
    <rect x="42" y="70" width="4" height="12" rx="1" fill="#818CF8" fill-opacity="0.8"/>
    <rect x="48" y="67" width="4" height="15" rx="1" fill="#818CF8"/>
    <!-- Orbit -->
    <circle cx="38" cy="45" r="20" fill="none" stroke="#38BDF8" stroke-width="0.8" stroke-opacity="0.2" stroke-dasharray="2 2"/>
  </g>
  <text x="156" y="56" fill="url(#g1)" font-size="28" font-weight="800" letter-spacing="-0.5" filter="url(#glow)">JARVIS·CLUSTER</text>
  <text x="157" y="79" fill="#2A3A5A" font-size="12.5" letter-spacing="0.5">Multi-Node AI Trading Cluster — M1/M2/M3 · MEXC · GPU</text>
  <rect x="156" y="89" width="340" height="1.5" rx="1" fill="url(#g1)" opacity="0.3"/>
  <g transform="translate(156,103)">
    <rect x="0"   y="0" width="62" height="22" rx="5" fill="#38BDF8" fill-opacity="0.1" stroke="#38BDF8" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="31"  y="15" text-anchor="middle" fill="#38BDF8" font-size="10">Python</text>
    <rect x="68"  y="0" width="70" height="22" rx="5" fill="#818CF8" fill-opacity="0.1" stroke="#818CF8" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="103" y="15" text-anchor="middle" fill="#818CF8" font-size="10">3 machines</text>
    <rect x="144" y="0" width="58" height="22" rx="5" fill="#38BDF8" fill-opacity="0.1" stroke="#38BDF8" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="173" y="15" text-anchor="middle" fill="#38BDF8" font-size="10">SQLite3</text>
    <rect x="208" y="0" width="54" height="22" rx="5" fill="#818CF8" fill-opacity="0.1" stroke="#818CF8" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="235" y="15" text-anchor="middle" fill="#818CF8" font-size="10">MEXC</text>
  </g>
  <text x="156" y="149" fill="#2A3A5A" font-size="10">Turbo31150  ·  MIT  ·  M3 config  ·  Quadro GPUs  ·  multi-node trading AI</text>
</svg>
