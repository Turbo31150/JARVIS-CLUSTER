version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies"]
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies"]
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
    labels: ["docker"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels: ["github-actions"]
